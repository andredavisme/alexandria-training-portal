<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alexandria — Discussion Boards</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #0F172A;
    --accent: #6366F1;
    --accent-light: #818CF8;
    --surface: #ffffff;
    --bg: #F1F5F9;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-muted: #64748B;
    --success: #10B981;
    --danger: #EF4444;
    --font: 'Inter', sans-serif;
    --radius: 10px;
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); color: var(--text); background: var(--bg); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .hidden { display: none !important; }

  /* Nav */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 0.75rem; height: 56px; }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .brand .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: #fff; flex-shrink: 0; }
  .brand-name { font-weight: 700; font-size: 0.95rem; }
  .brand-sub  { font-size: 0.72rem; color: var(--text-muted); }
  .nav-sep    { color: var(--border); }
  .nav-label  { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
  .nav-spacer { flex: 1; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.2s; font-family: var(--font); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--text); border-color: var(--border); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost  { background: transparent; color: var(--text-muted); border: none; padding: 6px 10px; font-size: 0.85rem; cursor: pointer; font-family: var(--font); text-decoration: none; white-space: nowrap; }
  .btn-ghost:hover { color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

  /* Layout */
  .page { max-width: 820px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Module context banner */
  .module-banner { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); border-left: 4px solid var(--accent); padding: 1.1rem 1.4rem; margin-bottom: 1.5rem; }
  .module-banner-top  { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.35rem; }
  .module-banner-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); margin-bottom: 0.25rem; }
  .module-banner-title { font-weight: 700; font-size: 1rem; line-height: 1.35; }
  .module-banner-dq    { font-size: 0.84rem; color: var(--text-muted); line-height: 1.55; margin-top: 0.35rem; font-style: italic; }
  .breadcrumb { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 1rem; flex-wrap: wrap; }
  .breadcrumb a { color: var(--accent); }
  .breadcrumb span { color: var(--border); }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .toolbar h1 { font-size: 1.4rem; font-weight: 700; flex: 1; min-width: 120px; }
  select { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 0.875rem; color: var(--text); background: var(--surface); cursor: pointer; }
  select:focus { outline: none; border-color: var(--accent); }
  select:disabled { opacity: 0.55; cursor: not-allowed; }

  /* New Thread Form */
  .form-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 2rem; margin-bottom: 1.5rem; }
  .form-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1rem; }
  label { font-size: 0.82rem; font-weight: 600; }
  input[type=text], textarea, select.form-select { width: 100%; padding: 9px 13px; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 0.875rem; color: var(--text); background: #fff; transition: border-color 0.2s; }
  input[type=text]:focus, textarea:focus, select.form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
  input:disabled, select:disabled, textarea:disabled { background: #F8FAFC; color: var(--text-muted); }
  textarea { resize: vertical; min-height: 100px; }
  .form-row { display: flex; gap: 0.75rem; }
  .form-row .form-group { flex: 1; }
  .form-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
  .module-scope-note { font-size: 0.78rem; color: var(--text-muted); background: #EEF2FF; border-radius: 7px; padding: 7px 10px; margin-bottom: 0.75rem; }

  /* Alert */
  .alert { padding: 11px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
  .alert-error   { background: #FEE2E2; border-left: 4px solid var(--danger);  color: #7F1D1D; }
  .alert-success { background: #D1FAE5; border-left: 4px solid var(--success); color: #064E3B; }
  .alert-info    { background: #EFF6FF; border-left: 4px solid var(--accent);  color: #1E3A5F; }

  /* Thread list */
  .thread-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .thread-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.2rem 1.4rem; display: block; color: inherit; text-decoration: none; transition: border-color 0.18s, box-shadow 0.18s; }
  .thread-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); text-decoration: none; }
  .thread-card.is-pinned { border-left: 4px solid var(--accent); }
  .thread-card.is-closed { opacity: 0.68; }
  .thread-header { display: flex; align-items: flex-start; gap: 0.75rem; }
  .thread-title { font-weight: 600; font-size: 0.97rem; flex: 1; line-height: 1.45; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 0.71rem; font-weight: 600; white-space: nowrap; }
  .badge-pinned { background: #EEF2FF; color: var(--accent); }
  .badge-closed { background: #F1F5F9; color: var(--text-muted); }
  .badge-staff  { background: #EEF2FF; color: var(--accent); }
  .badge-source { background: #FEF3C7; color: #92400E; }
  .badge-module { background: #DCFCE7; color: #15803D; }
  .thread-preview { margin-top: 0.4rem; font-size: 0.84rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .thread-meta { margin-top: 0.55rem; font-size: 0.79rem; color: var(--text-muted); display: flex; gap: 0.75rem; flex-wrap: wrap; }

  /* Empty / Spinner */
  .empty { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .empty-icon  { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .empty-title { font-weight: 600; font-size: 1rem; color: var(--text); margin-bottom: 0.35rem; }
  .empty-sub   { font-size: 0.875rem; }
  .spinner { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.875rem; }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="brand">
    <div class="logo">A</div>
    <div>
      <div class="brand-name">Alexandria</div>
      <div class="brand-sub">Training Portal</div>
    </div>
  </a>
  <span class="nav-sep" id="nav-sep-1">›</span>
  <span class="nav-label" id="nav-context">Discussion Boards</span>
  <span class="nav-sep hidden" id="nav-sep-2">›</span>
  <span class="nav-label hidden" id="nav-module-label"></span>
  <div class="nav-spacer"></div>
  <a id="nav-back" href="index.html" class="btn-ghost btn-sm">← Home</a>
</nav>

<div class="page">

  <!-- Breadcrumb (module mode only) -->
  <div class="breadcrumb hidden" id="breadcrumb">
    <a href="index.html">Home</a>
    <span>›</span>
    <a href="catalog.html">Catalog</a>
    <span>›</span>
    <a id="bc-course" href="#">Course</a>
    <span>›</span>
    <a href="discussion.html" id="bc-all-disc">All Discussions</a>
    <span>›</span>
    <span id="bc-module">Module Discussion</span>
  </div>

  <!-- Module context banner (module mode only) -->
  <div class="module-banner hidden" id="module-banner">
    <div class="module-banner-label" id="banner-label">Module Discussion</div>
    <div class="module-banner-top">
      <div>
        <div class="module-banner-title" id="banner-title"></div>
        <div class="module-banner-dq" id="banner-dq"></div>
      </div>
      <a id="banner-course-link" href="#" class="btn btn-outline btn-sm" style="flex-shrink:0">← Back to Course</a>
    </div>
  </div>

  <div class="toolbar">
    <h1 id="page-title">Discussions</h1>
    <select id="course-filter">
      <option value="">All Courses</option>
    </select>
    <button class="btn btn-primary" id="btn-new-thread">+ New Thread</button>
  </div>

  <!-- New thread form -->
  <div class="form-card hidden" id="new-thread-panel">
    <h2>Start a New Thread</h2>
    <div id="module-scope-note" class="module-scope-note hidden"></div>
    <div id="new-thread-alert"></div>
    <div class="form-row">
      <div class="form-group">
        <label>Your Name *</label>
        <input type="text" id="nt-author" placeholder="Display name"/>
      </div>
      <div class="form-group">
        <label>Course *</label>
        <select class="form-select" id="nt-course"><option value="">Select a course…</option></select>
      </div>
    </div>
    <div class="form-group">
      <label>Thread Title *</label>
      <input type="text" id="nt-title" placeholder="What’s your question or topic?"/>
    </div>
    <div class="form-group">
      <label>Body <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
      <textarea id="nt-body" placeholder="Add context or detail…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-submit-thread">Post Thread</button>
      <button class="btn btn-outline" id="btn-cancel-thread">Cancel</button>
    </div>
  </div>

  <!-- Thread list -->
  <div id="thread-list-wrap"><div class="spinner">Loading threads…</div></div>

</div>

<script type="module">
import { fetchThreads, fetchThreadsByModule, fetchCourses, submitThread, formatDate, sourceLabel, escHtml } from './js/discussion.js'

const SUPABASE_URL = 'https://hhyhulqngdkwsxhymmcd.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoeWh1bHFuZ2Rrd3N4aHltbWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzEyMDEsImV4cCI6MjA5MjcwNzIwMX0.dmSy7Q8Je5lEY4XCFzwvfPnkBYLebPE0yZMhy6Y8czI'
const hdrs = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }

const qp = new URLSearchParams(location.search)
const paramCourse = qp.get('course')
const paramModule = qp.get('module')
const isModuleMode = !!(paramCourse && paramModule)

let courses = []
let moduleInfo = null

function setAlert(id, type, msg) {
  document.getElementById(id).innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : ''
}

async function fetchModuleInfo(moduleId) {
  const p = new URLSearchParams({ id: `eq.${moduleId}`, select: 'id,title,driving_question,description', limit: '1' })
  const r = await fetch(`${SUPABASE_URL}/rest/v1/modules?${p}`, { headers: hdrs })
  const d = await r.json()
  return r.ok && d.length ? d[0] : null
}

async function fetchCourseModuleOrder(courseId, moduleId) {
  const p = new URLSearchParams({ course_id: `eq.${courseId}`, module_id: `eq.${moduleId}`, select: 'order_index,section_label', limit: '1' })
  const r = await fetch(`${SUPABASE_URL}/rest/v1/course_modules?${p}`, { headers: hdrs })
  const d = await r.json()
  return r.ok && d.length ? d[0] : null
}

async function init() {
  await loadCourses()

  if (isModuleMode) {
    const [mod, cm] = await Promise.all([
      fetchModuleInfo(paramModule),
      fetchCourseModuleOrder(paramCourse, paramModule)
    ])
    moduleInfo = mod

    const course      = courses.find(c => c.id === paramCourse)
    const courseTitle = course?.title || 'Course'
    const moduleNum   = cm?.order_index || ''
    const sectionLabel = cm?.section_label || ''
    const moduleTitle  = mod?.title || 'Module Discussion'
    const drivingQ     = mod?.driving_question || ''

    document.getElementById('nav-context').textContent = courseTitle
    document.getElementById('nav-sep-2').classList.remove('hidden')
    document.getElementById('nav-module-label').textContent = `Module ${moduleNum} Discussion`
    document.getElementById('nav-module-label').classList.remove('hidden')
    document.getElementById('nav-back').textContent = `← ${courseTitle}`
    document.getElementById('nav-back').href = `course.html?course=${paramCourse}`

    const bc = document.getElementById('breadcrumb')
    bc.classList.remove('hidden')
    document.getElementById('bc-course').textContent = courseTitle
    document.getElementById('bc-course').href = `course.html?course=${paramCourse}`
    document.getElementById('bc-all-disc').href = `discussion.html?course=${paramCourse}`
    document.getElementById('bc-module').textContent = `Module ${moduleNum} Discussion`

    document.getElementById('module-banner').classList.remove('hidden')
    document.getElementById('banner-label').textContent = `Module ${moduleNum}${sectionLabel ? ' — ' + sectionLabel : ''} · Discussion`
    document.getElementById('banner-title').textContent = moduleTitle
    document.getElementById('banner-dq').textContent = drivingQ ? `“${drivingQ}”` : ''
    document.getElementById('banner-course-link').href = `course.html?course=${paramCourse}`

    document.getElementById('page-title').textContent = `Module ${moduleNum} Discussion`
    document.title = `Alexandria — Module ${moduleNum} Discussion`

    const sel = document.getElementById('course-filter')
    sel.value = paramCourse
    sel.disabled = true

    document.getElementById('module-scope-note').textContent = `📌 This thread will be posted to Module ${moduleNum}: ${moduleTitle}`
    document.getElementById('module-scope-note').classList.remove('hidden')
    const ntCourse = document.getElementById('nt-course')
    ntCourse.value = paramCourse
    ntCourse.disabled = true

    await loadThreads(paramCourse, paramModule)
  } else {
    if (paramCourse) {
      document.getElementById('course-filter').value = paramCourse
      const c = courses.find(c => c.id === paramCourse)
      if (c) {
        document.getElementById('nav-context').textContent = `${c.title} — Discussions`
        document.getElementById('nav-back').href = `course.html?course=${paramCourse}`
        document.getElementById('nav-back').textContent = `← ${c.title}`
      }
    }
    await loadThreads(paramCourse || null, null)
  }
}

async function loadCourses() {
  const { data } = await fetchCourses()
  courses = data || []
  const filterSel = document.getElementById('course-filter')
  const ntSel = document.getElementById('nt-course')
  courses.forEach(c => {
    filterSel.appendChild(new Option(c.title, c.id))
    ntSel.appendChild(new Option(c.title, c.id))
  })
}

async function loadThreads(courseId, moduleId) {
  document.getElementById('thread-list-wrap').innerHTML = '<div class="spinner">Loading threads…</div>'
  const { data, error } = moduleId
    ? await fetchThreadsByModule(courseId, moduleId)
    : await fetchThreads(courseId)
  if (error) {
    document.getElementById('thread-list-wrap').innerHTML = '<div class="alert alert-error">Failed to load threads. Please try again.</div>'
    return
  }
  const threads = data || []
  if (!threads.length) {
    document.getElementById('thread-list-wrap').innerHTML = `
      <div class="empty">
        <div class="empty-icon">💬</div>
        <div class="empty-title">No threads yet</div>
        <div class="empty-sub">Be the first to start a discussion for this module.</div>
      </div>`
    return
  }
  document.getElementById('thread-list-wrap').innerHTML =
    `<div class="thread-list">${threads.map(t => renderThread(t, moduleId)).join('')}</div>`
}

function renderThread(t, moduleId) {
  const src = sourceLabel(t.source)
  const course = courses.find(c => c.id === t.course_id)
  const isModuleThread = t.module_id && !moduleId
  return `
  <a class="thread-card${t.status === 'pinned' ? ' is-pinned' : ''}${t.status === 'closed' ? ' is-closed' : ''}" href="discussion-thread.html?id=${t.id}">
    <div class="thread-header">
      <div class="thread-title">${escHtml(t.title)}</div>
      <div class="badges">
        ${t.status === 'pinned' ? '<span class="badge badge-pinned">📌 Pinned</span>' : ''}
        ${t.status === 'closed' ? '<span class="badge badge-closed">Closed</span>' : ''}
        ${t.author_type === 'staff' ? '<span class="badge badge-staff">Staff</span>' : ''}
        ${isModuleThread ? '<span class="badge badge-module">Module Thread</span>' : ''}
        ${src ? `<span class="badge badge-source">via ${escHtml(src)}</span>` : ''}
      </div>
    </div>
    ${t.body ? `<div class="thread-preview">${escHtml(t.body)}</div>` : ''}
    <div class="thread-meta">
      <span>by ${escHtml(t.author_name || 'Anonymous')}</span>
      ${course && !moduleId ? `<span>in ${escHtml(course.title)}</span>` : ''}
      <span>Updated ${formatDate(t.updated_at)}</span>
    </div>
  </a>`
}

document.getElementById('course-filter').addEventListener('change', e => {
  if (!isModuleMode) loadThreads(e.target.value || null, null)
})

document.getElementById('btn-new-thread').addEventListener('click', () => {
  const panel = document.getElementById('new-thread-panel')
  panel.classList.toggle('hidden')
  if (!panel.classList.contains('hidden')) document.getElementById('nt-author').focus()
})
document.getElementById('btn-cancel-thread').addEventListener('click', () => {
  document.getElementById('new-thread-panel').classList.add('hidden')
  setAlert('new-thread-alert', '', '')
})

document.getElementById('btn-submit-thread').addEventListener('click', async () => {
  const author   = document.getElementById('nt-author').value.trim()
  const courseId = document.getElementById('nt-course').value
  const title    = document.getElementById('nt-title').value.trim()
  const body     = document.getElementById('nt-body').value.trim()
  setAlert('new-thread-alert', '', '')

  if (!author)   { setAlert('new-thread-alert', 'error', 'Your name is required.'); return }
  if (!courseId) { setAlert('new-thread-alert', 'error', 'Please select a course.'); return }
  if (!title)    { setAlert('new-thread-alert', 'error', 'Thread title is required.'); return }

  const btn = document.getElementById('btn-submit-thread')
  btn.disabled = true; btn.textContent = 'Posting…'

  const { data, error } = await submitThread(
    courseId, title, body, author,
    isModuleMode ? paramModule : null
  )
  btn.disabled = false; btn.textContent = 'Post Thread'

  if (error) { setAlert('new-thread-alert', 'error', 'Failed to post thread. Please try again.'); return }

  window.location.href = `discussion-thread.html?id=${data.id}`
})

await init()
</script>
</body>
</html>
