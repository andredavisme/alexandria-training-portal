<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alexandria — Course</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --accent: #16A34A;
    --surface: #ffffff;
    --bg: #F1F5F9;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-muted: #64748B;
    --font: 'Inter', sans-serif;
    --radius: 10px;
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); color: var(--text); background: var(--bg); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  .hidden { display: none !important; }

  /* Nav */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 0.75rem; height: 56px; }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .brand .logo { width: 32px; height: 32px; background: #6366F1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: #fff; flex-shrink: 0; }
  .brand-name { font-weight: 700; font-size: 0.95rem; }
  .brand-sub  { font-size: 0.72rem; color: var(--text-muted); }
  .nav-sep    { color: var(--border); }
  .nav-label  { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
  .nav-spacer { flex: 1; }
  .btn-ghost  { background: transparent; color: var(--text-muted); border: none; padding: 6px 10px; font-size: 0.85rem; cursor: pointer; font-family: var(--font); text-decoration: none; white-space: nowrap; }
  .btn-ghost:hover { color: var(--text); }

  /* Page */
  .page { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  /* Course hero */
  .course-hero { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 2rem; }
  .hero-stripe { height: 6px; width: 100%; }
  .hero-body   { padding: 1.75rem 2rem; }
  .hero-meta   { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 0.5rem; }
  .hero-title  { font-size: 1.5rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.6rem; }
  .hero-desc   { font-size: 0.9rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 1.1rem; }
  .hero-thread { font-size: 0.85rem; color: var(--text-muted); border-left: 3px solid var(--accent); padding-left: 0.85rem; line-height: 1.6; font-style: italic; margin-bottom: 1.25rem; }
  .hero-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; font-family: var(--font); border: none; cursor: pointer; text-decoration: none; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-outline { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; font-family: var(--font); border: 1.5px solid var(--border); background: transparent; cursor: pointer; color: var(--text-muted); text-decoration: none; transition: border-color 0.15s, color 0.15s; }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  /* Section header */
  .section-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 1rem; margin-top: 0.25rem; }

  /* Module cards */
  .modules-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
  .module-card  { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
  .module-header { display: flex; align-items: center; gap: 1rem; padding: 1.1rem 1.4rem; cursor: pointer; user-select: none; transition: background 0.15s; }
  .module-header:hover { background: #F8FAFC; }
  .module-num   { flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #fff; }
  .module-header-info { flex: 1; }
  .module-month { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .module-title { font-weight: 700; font-size: 0.95rem; line-height: 1.3; }
  .module-dq    { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
  .module-chevron { font-size: 0.9rem; color: var(--text-muted); transition: transform 0.2s; }
  .module-card.is-open .module-chevron { transform: rotate(180deg); }

  .module-body  { border-top: 1px solid var(--border); padding: 1.25rem 1.4rem; display: flex; flex-direction: column; gap: 1.25rem; }

  /* Module body sections */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.85rem; }
  @media (max-width: 560px) { .info-grid { grid-template-columns: 1fr; } }
  .info-block { background: #F8FAFC; border-radius: 8px; padding: 0.85rem 1rem; }
  .info-block-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.35rem; }
  .info-block-text  { font-size: 0.83rem; line-height: 1.6; color: var(--text); }
  .info-block.diaspora { grid-column: 1 / -1; border-left: 3px solid var(--accent); }

  /* Activities */
  .subsection-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 0.6rem; display: flex; align-items: center; gap: 6px; }
  .activity-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .activity-row  { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.7rem 0.9rem; background: #F8FAFC; border-radius: 8px; }
  .act-badge { flex-shrink: 0; padding: 2px 8px; border-radius: 20px; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 1px; }
  .act-experiment        { background: #DBEAFE; color: #1E40AF; }
  .act-math              { background: #FEF9C3; color: #854D0E; }
  .act-reading           { background: #F3E8FF; color: #6B21A8; }
  .act-language          { background: #FCE7F3; color: #9D174D; }
  .act-problem_solving   { background: #FFEDD5; color: #9A3412; }
  .act-culminating_project { background: #D1FAE5; color: #065F46; }
  .act-commons           { background: #E0F2FE; color: #075985; }
  .act-info { flex: 1; }
  .act-title { font-weight: 600; font-size: 0.85rem; }
  .act-desc  { font-size: 0.79rem; color: var(--text-muted); line-height: 1.55; margin-top: 2px; }
  .act-skills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .skill-pill { font-size: 0.65rem; padding: 2px 7px; background: var(--border); border-radius: 20px; color: var(--text-muted); }

  /* Journal prompts */
  .journal-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .journal-row  { display: flex; gap: 0.75rem; padding: 0.7rem 0.9rem; background: #FFFBEB; border-radius: 8px; border-left: 3px solid #F59E0B; }
  .journal-icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }
  .journal-text { font-size: 0.83rem; line-height: 1.6; color: var(--text); }

  /* Commons milestone */
  .commons-block { background: #F0FDF4; border-radius: 8px; border: 1.5px solid #BBF7D0; padding: 1rem 1.1rem; }
  .commons-title { font-weight: 700; font-size: 0.88rem; color: #15803D; margin-bottom: 0.35rem; display: flex; align-items: center; gap: 6px; }
  .commons-desc  { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 0.6rem; }
  .commons-detail { font-size: 0.78rem; color: var(--text-muted); display: flex; flex-direction: column; gap: 3px; }
  .commons-detail span { display: flex; gap: 5px; }
  .commons-detail strong { color: var(--text); font-weight: 600; }

  /* Module footer */
  .module-footer { display: flex; gap: 0.75rem; flex-wrap: wrap; padding-top: 0.25rem; border-top: 1px solid var(--border); }

  /* Commons banner */
  .commons-banner { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); border-top: 4px solid #16A34A; padding: 1.4rem 1.75rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .commons-banner-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
  .commons-banner-info p  { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; max-width: 520px; }

  /* States */
  .spinner { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 0.875rem; }
  .alert   { padding: 11px 14px; border-radius: 8px; font-size: 0.85rem; }
  .alert-error { background: #FEE2E2; border-left: 4px solid #EF4444; color: #7F1D1D; }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="brand">
    <div class="logo">A</div>
    <div>
      <div class="brand-name">Alexandria</div>
      <div class="brand-sub">Training Portal</div>
    </div>
  </a>
  <span class="nav-sep">›</span>
  <a href="catalog.html" class="btn-ghost" style="padding:6px 4px;">Course Catalog</a>
  <span class="nav-sep">›</span>
  <span class="nav-label" id="nav-course-title">Loading…</span>
  <div class="nav-spacer"></div>
  <a href="catalog.html" class="btn-ghost">← Catalog</a>
</nav>

<div class="page" id="page">
  <div class="spinner">Loading course…</div>
</div>

<script type="module">
import { fetchCourseDetail, escHtml } from './js/catalog.js'
import { fetchCommonsThread } from './js/discussion.js'

const params  = new URLSearchParams(location.search)
const courseId = params.get('course')

if (!courseId) {
  document.getElementById('page').innerHTML = '<div class="alert alert-error">No course specified. <a href="catalog.html">← Back to catalog</a></div>'
} else {
  const [{ data: course, error }, { data: commonsThread }] = await Promise.all([
    fetchCourseDetail(courseId),
    fetchCommonsThread(courseId)
  ])

  if (error || !course) {
    document.getElementById('page').innerHTML = '<div class="alert alert-error">Failed to load course. <a href="catalog.html">← Back to catalog</a></div>'
  } else {
    document.title = `Alexandria — ${course.title}`
    document.getElementById('nav-course-title').textContent = course.title
    // Override accent from course color
    document.documentElement.style.setProperty('--accent', course.accent_color || '#16A34A')
    document.getElementById('page').innerHTML = renderPage(course, commonsThread)
    wireModuleToggles()
  }
}

function renderPage(c, commonsThread) {
  const accent = c.accent_color || '#16A34A'
  const modules = c.course_modules || []
  const commonsLink = commonsThread
    ? `<a class="btn-outline" href="discussion-thread.html?thread=${commonsThread.id}">♻️ Classroom Commons Discussion</a>`
    : ''

  return `
    <div class="course-hero">
      <div class="hero-stripe" style="background:${escHtml(accent)}"></div>
      <div class="hero-body">
        <div class="hero-meta">${escHtml(c.audience || '')} &middot; ${c.duration_months || 6} Months</div>
        <div class="hero-title">${escHtml(c.title)}</div>
        <div class="hero-desc">${escHtml(c.description || '')}</div>
        ${c.course_thread ? `<div class="hero-thread">${escHtml(c.course_thread)}</div>` : ''}
        <div class="hero-actions">
          <a class="btn-primary" href="discussion.html?course=${c.id}" style="background:${escHtml(accent)};color:#fff;">💬 Course Discussion Board</a>
          ${commonsLink}
        </div>
      </div>
    </div>

    <div class="section-label">Course Modules</div>
    <div class="modules-list">
      ${modules.map(cm => renderModuleCard(cm, accent)).join('')}
    </div>

    <div class="commons-banner">
      <div class="commons-banner-info">
        <h3>♻️ The Classroom Commons</h3>
        <p>A course-long community project running all 6 months. The class organizes as a community, develops recycling systems, and builds a circular economy — repurposing classroom materials for use or profit. Each module's milestone is shown inside its module card above.</p>
      </div>
      <div style="display:flex;gap:0.6rem;flex-wrap:wrap;">
        ${commonsThread ? `<a class="btn-primary" href="discussion-thread.html?thread=${commonsThread.id}" style="background:#16A34A;color:#fff;">View Commons Discussion</a>` : ''}
      </div>
    </div>`
}

function renderModuleCard(cm, accent) {
  const m = cm.modules
  if (!m) return ''
  const activities   = m.activities || []
  const journals     = m.journal_prompts || []
  const commons      = m.commons_milestones?.[0]

  const activityBadgeLabel = {
    experiment: 'Experiment', math: 'Math', reading: 'Reading',
    language: 'Language', problem_solving: 'Problem Solving',
    culminating_project: 'Project', commons: 'Commons'
  }

  return `
  <div class="module-card" id="module-${m.id}">
    <div class="module-header" data-module="${m.id}">
      <div class="module-num" style="background:${escHtml(accent)}">${cm.order_index}</div>
      <div class="module-header-info">
        <div class="module-month">${escHtml(cm.section_label || '')}</div>
        <div class="module-title">${escHtml(m.title)}</div>
        <div class="module-dq">${escHtml(m.driving_question || '')}</div>
      </div>
      <span class="module-chevron">▾</span>
    </div>

    <div class="module-body hidden">

      <div class="info-grid">
        <div class="info-block">
          <div class="info-block-label">🔬 Science Concept</div>
          <div class="info-block-text">${escHtml(m.science_concept || '')}</div>
        </div>
        <div class="info-block diaspora">
          <div class="info-block-label">🌍 Diaspora Connection</div>
          <div class="info-block-text">${escHtml(m.diaspora_connection || '')}</div>
        </div>
      </div>

      <div>
        <div class="subsection-title">📋 Activities</div>
        <div class="activity-list">
          ${activities.map(a => `
          <div class="activity-row">
            <span class="act-badge act-${escHtml(a.activity_type)}">${escHtml(activityBadgeLabel[a.activity_type] || a.activity_type)}</span>
            <div class="act-info">
              <div class="act-title">${escHtml(a.title)}</div>
              ${a.instructions ? `<div class="act-desc">${escHtml(a.instructions)}</div>` : ''}
              ${a.skill_focus?.length ? `<div class="act-skills">${a.skill_focus.map(s => `<span class="skill-pill">${escHtml(s)}</span>`).join('')}</div>` : ''}
            </div>
          </div>`).join('')}
        </div>
      </div>

      <div>
        <div class="subsection-title">📓 Journal Prompts</div>
        <div class="journal-list">
          ${journals.map(j => `
          <div class="journal-row">
            <span class="journal-icon">✏️</span>
            <div class="journal-text">${escHtml(j.prompt)}</div>
          </div>`).join('')}
        </div>
      </div>

      ${commons ? `
      <div>
        <div class="subsection-title">♻️ Classroom Commons Milestone</div>
        <div class="commons-block">
          <div class="commons-title">📦 ${escHtml(commons.title)}</div>
          <div class="commons-desc">${escHtml(commons.description || '')}</div>
          <div class="commons-detail">
            ${commons.commons_activity ? `<span><strong>Activity:</strong> ${escHtml(commons.commons_activity)}</span>` : ''}
            ${commons.math_connection  ? `<span><strong>Math:</strong> ${escHtml(commons.math_connection)}</span>` : ''}
            ${commons.diaspora_link    ? `<span><strong>Diaspora Link:</strong> ${escHtml(commons.diaspora_link)}</span>` : ''}
          </div>
        </div>
      </div>` : ''}

      <div class="module-footer">
        <a class="btn-outline" href="discussion.html?course=${escHtml(cm.course_id)}&module=${escHtml(m.id)}">💬 Discuss Module ${cm.order_index} →</a>
      </div>

    </div>
  </div>`
}

function wireModuleToggles() {
  document.querySelectorAll('.module-header').forEach(header => {
    header.addEventListener('click', () => {
      const card = header.closest('.module-card')
      const body = card.querySelector('.module-body')
      const open = !body.classList.contains('hidden')
      body.classList.toggle('hidden', open)
      card.classList.toggle('is-open', !open)
    })
  })
}
</script>
</body>
</html>
