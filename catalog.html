<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alexandria — Course Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --accent: #6366F1;
    --accent-light: #818CF8;
    --surface: #ffffff;
    --bg: #F1F5F9;
    --border: #E2E8F0;
    --text: #0F172A;
    --text-muted: #64748B;
    --success: #10B981;
    --font: 'Inter', sans-serif;
    --radius: 10px;
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); color: var(--text); background: var(--bg); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  .hidden { display: none !important; }

  /* Nav */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; gap: 0.75rem; height: 56px; }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .brand .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: #fff; flex-shrink: 0; }
  .brand-name { font-weight: 700; font-size: 0.95rem; }
  .brand-sub  { font-size: 0.72rem; color: var(--text-muted); }
  .nav-sep    { color: var(--border); }
  .nav-label  { font-weight: 600; font-size: 0.9rem; color: var(--text-muted); }
  .nav-spacer { flex: 1; }
  .btn-ghost  { background: transparent; color: var(--text-muted); border: none; padding: 6px 10px; font-size: 0.85rem; cursor: pointer; font-family: var(--font); text-decoration: none; }
  .btn-ghost:hover { color: var(--text); }

  /* Page */
  .page { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.35rem; }
  .page-header p  { font-size: 0.9rem; color: var(--text-muted); }

  /* Course grid */
  .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

  /* Course card */
  .course-card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s; }
  .course-card:hover { box-shadow: var(--shadow-lg); }
  .course-card.is-draft { opacity: 0.8; }

  .card-stripe { height: 5px; width: 100%; }

  .card-body { padding: 1.4rem 1.5rem 1rem; flex: 1; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.6rem; }
  .card-title { font-weight: 700; font-size: 1rem; line-height: 1.4; }

  .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 0.71rem; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .badge-published { background: #D1FAE5; color: #065F46; }
  .badge-draft     { background: #FEF3C7; color: #92400E; }

  .card-desc { font-size: 0.855rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1rem; }

  .card-stats { display: flex; gap: 1rem; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 1rem; }
  .card-stats span { display: flex; align-items: center; gap: 4px; }

  /* Module toggle button */
  .card-footer { padding: 0 1.5rem 1.2rem; }
  .btn-modules { width: 100%; padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: transparent; font-family: var(--font); font-size: 0.82rem; font-weight: 500; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.18s; }
  .btn-modules:hover { border-color: var(--accent); color: var(--accent); }
  .btn-modules.is-open { border-color: var(--accent); color: var(--accent); background: #EEF2FF; }
  .btn-modules .chevron { transition: transform 0.2s; font-style: normal; }
  .btn-modules.is-open .chevron { transform: rotate(180deg); }

  /* Module list */
  .module-list { border-top: 1px solid var(--border); }
  .module-item { display: flex; gap: 0.85rem; padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border); }
  .module-item:last-child { border-bottom: none; }
  .module-index { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #fff; margin-top: 1px; }
  .module-info {}
  .module-section { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 2px; }
  .module-title { font-weight: 600; font-size: 0.875rem; margin-bottom: 2px; }
  .module-desc  { font-size: 0.79rem; color: var(--text-muted); line-height: 1.5; }

  /* Discuss link inside card */
  .card-discuss { padding: 0.65rem 1.5rem 1.1rem; }
  .discuss-link { font-size: 0.8rem; color: var(--accent); display: flex; align-items: center; gap: 5px; }
  .discuss-link:hover { text-decoration: underline; }

  /* States */
  .spinner { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 0.875rem; }
  .alert { padding: 11px 14px; border-radius: 8px; font-size: 0.85rem; }
  .alert-error { background: #FEE2E2; border-left: 4px solid #EF4444; color: #7F1D1D; }
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="brand">
    <div class="logo">A</div>
    <div>
      <div class="brand-name">Alexandria</div>
      <div class="brand-sub">Training Portal</div>
    </div>
  </a>
  <span class="nav-sep">›</span>
  <span class="nav-label">Course Catalog</span>
  <div class="nav-spacer"></div>
  <a href="index.html" class="btn-ghost">← Home</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1>Course Catalog</h1>
    <p>Browse available courses and explore their module outlines.</p>
  </div>
  <div id="catalog-wrap"><div class="spinner">Loading courses…</div></div>
</div>

<script type="module">
import { fetchCatalog, escHtml } from './js/catalog.js'

const { data: courses, error } = await fetchCatalog()

if (error || !courses) {
  document.getElementById('catalog-wrap').innerHTML =
    '<div class="alert alert-error">Failed to load courses. Please try again.</div>'
} else {
  document.getElementById('catalog-wrap').innerHTML =
    `<div class="course-grid">${courses.map(renderCard).join('')}</div>`

  // Wire up module toggle buttons
  document.querySelectorAll('.btn-modules').forEach(btn => {
    btn.addEventListener('click', () => {
      const list = document.getElementById(`modules-${btn.dataset.course}`)
      const open = !list.classList.contains('hidden')
      list.classList.toggle('hidden', open)
      btn.classList.toggle('is-open', !open)
      btn.querySelector('.chevron').textContent = open ? '▾' : '▾'
    })
  })
}

function renderCard(c) {
  const accent = c.accent_color || '#6366F1'
  const modules = c.course_modules || []
  const isDraft = c.status === 'draft'

  return `
  <div class="course-card${isDraft ? ' is-draft' : ''}">
    <div class="card-stripe" style="background:${escHtml(accent)}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-title">${escHtml(c.title)}</div>
        <span class="badge ${isDraft ? 'badge-draft' : 'badge-published'}">
          ${isDraft ? 'Coming Soon' : 'Open'}
        </span>
      </div>
      <div class="card-desc">${escHtml(c.description || '')}</div>
      <div class="card-stats">
        <span>📚 ${modules.length} module${modules.length !== 1 ? 's' : ''}</span>
      </div>
    </div>

    <div class="card-footer">
      <button class="btn-modules" data-course="${c.id}" ${isDraft ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>
        <span>View module outline</span>
        <i class="chevron">▾</i>
      </button>
    </div>

    <div id="modules-${c.id}" class="module-list hidden">
      ${modules.map((cm, i) => `
      <div class="module-item">
        <div class="module-index" style="background:${escHtml(accent)}">${i + 1}</div>
        <div class="module-info">
          ${cm.section_label ? `<div class="module-section">${escHtml(cm.section_label)}</div>` : ''}
          <div class="module-title">${escHtml(cm.modules?.title || '')}</div>
          ${cm.modules?.description ? `<div class="module-desc">${escHtml(cm.modules.description)}</div>` : ''}
        </div>
      </div>`).join('')}
    </div>

    ${!isDraft ? `
    <div class="card-discuss">
      <a class="discuss-link" href="discussion.html?course=${c.id}">💬 Discuss this course →</a>
    </div>` : ''}
  </div>`
}
</script>
</body>
</html>
