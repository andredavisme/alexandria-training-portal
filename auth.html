<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>207 Analytix — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0d1117; --bg2:#161b22; --bg3:#1c2333;
    --green:#4ade80; --teal:#2dd4bf; --gold:#fbbf24; --coral:#fb7185; --purple:#a78bfa;
    --text:#e6edf3; --text2:#8b949e; --border:#30363d;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 400px;
    text-align: center;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.5rem;
    background: linear-gradient(135deg, var(--green), var(--teal));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 0.25rem;
  }
  .tagline { font-size: 0.82rem; color: var(--text2); margin-bottom: 2rem; }
  .divider { font-size: 0.72rem; color: var(--text2); margin: 1.25rem 0; text-transform: uppercase; letter-spacing: 0.08em; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    width: 100%; padding: 0.75rem 1rem;
    border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-github {
    background: var(--text); color: var(--bg);
  }
  .btn-magic {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    margin-top: 0.75rem;
  }

  .input {
    width: 100%; padding: 0.7rem 0.9rem;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem;
    margin-bottom: 0.75rem; outline: none;
    transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--green); }
  .input::placeholder { color: var(--text2); }

  .msg {
    font-size: 0.8rem; margin-top: 1rem; padding: 0.6rem 0.9rem;
    border-radius: 8px; display: none;
  }
  .msg.success { background: rgba(74,222,128,0.1); color: var(--green); display: block; }
  .msg.error   { background: rgba(251,113,133,0.1); color: var(--coral); display: block; }

  .footer { font-size: 0.72rem; color: var(--text2); margin-top: 1.75rem; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">207 Analytix</div>
  <div class="tagline">Portland, ME &mdash; Internal Team Portal</div>

  <!-- GitHub Login -->
  <button class="btn btn-github" id="btnGithub">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 013-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.69.83.57C20.57 21.79 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
    </svg>
    Continue with GitHub
  </button>

  <div class="divider">or sign in with email</div>

  <!-- Magic Link -->
  <input class="input" type="email" id="emailInput" placeholder="you@example.com" />
  <button class="btn btn-magic" id="btnMagic">Send Magic Link</button>

  <div class="msg" id="msg"></div>

  <div class="footer">207 Analytix team members only. Unauthorized access is prohibited.</div>
</div>

<script>
  const SUPA_URL = 'https://hhyhulqngdkwsxhymmcd.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoeWh1bHFuZ2Rrd3N4aHltbWNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzEyMDEsImV4cCI6MjA5MjcwNzIwMX0.dmSy7Q8Je5lEY4XCFzwvfPnkBYLebPE0yZMhy6Y8czI';
  const { createClient } = supabase;
  const db = createClient(SUPA_URL, SUPA_KEY);

  const msg = document.getElementById('msg');

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }

  // GitHub OAuth
  document.getElementById('btnGithub').onclick = async () => {
    const { error } = await db.auth.signInWithOAuth({
      provider: 'github',
      options: { redirectTo: window.location.origin + '/alexandria-training-portal/index.html' }
    });
    if (error) showMsg(error.message, 'error');
  };

  // Magic Link
  document.getElementById('btnMagic').onclick = async () => {
    const email = document.getElementById('emailInput').value.trim();
    if (!email) { showMsg('Please enter your email.', 'error'); return; }
    const { error } = await db.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/alexandria-training-portal/index.html' }
    });
    if (error) showMsg(error.message, 'error');
    else showMsg('Magic link sent! Check your inbox.', 'success');
  };

  // Auto-redirect if already logged in
  db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'index.html';
  });
</script>
</body>
</html>
